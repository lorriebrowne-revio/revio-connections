<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rev.io Connections</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Arial', sans-serif; background: #1D3756; color: #ffffff; min-height: 100vh; }

  header { background: #1D3756; text-align: center; padding: 20px 20px 16px; border-bottom: 3px solid #6EBE4F; }
  .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 10px; }
  .logo-text { font-size: 28px; font-weight: 800; color: #fff; letter-spacing: -0.5px; }
  .logo-dot { color: #6EBE4F; }
  .logo-tag { font-size: 11px; color: #6EBE4F; letter-spacing: 3px; text-transform: uppercase; font-weight: 600; }
  .game-title { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: 1px; margin-top: 4px; }
  .week-badge { display: inline-block; background: #6EBE4F; color: #1D3756; font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 20px; margin-top: 6px; letter-spacing: 1px; }

  .instructions { text-align: center; font-size: 13px; color: #aac4dd; padding: 10px 20px 4px; }

  .mistakes { text-align: center; padding: 8px; font-size: 13px; color: #ccc; }
  .dots { display: flex; justify-content: center; gap: 6px; margin-top: 5px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #6EBE4F; }
  .dot.used { background: #2e4f6e; }

  .game-area { max-width: 580px; margin: 0 auto; padding: 10px 16px 24px; }

  .solved-area { display: flex; flex-direction: column; gap: 6px; margin-bottom: 6px; }
  .solved-row { border-radius: 8px; padding: 12px 16px; text-align: center; }
  .solved-row .cat-name { font-size: 13px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
  .solved-row .cat-words { font-size: 13px; margin-top: 3px; opacity: 0.9; }

  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
  .tile {
    background: #24486e;
    border: 1.5px solid #2e5a80;
    border-radius: 8px;
    height: 68px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
    display: flex; align-items: center; justify-content: center; text-align: center;
    line-height: 1.3; padding: 6px;
    user-select: none;
    color: #ffffff;
  }
  .tile:hover { background: #2e5a80; border-color: #6EBE4F; }
  .tile.selected { background: #6EBE4F; color: #1D3756; border-color: #6EBE4F; }
  .tile.shake { animation: shake 0.4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }
  .tile.pop { animation: pop 0.3s; }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.07)} 100%{transform:scale(1)} }

  .btn-row { display: flex; gap: 8px; justify-content: center; margin-bottom: 10px; }
  button.action {
    border: 1.5px solid #4a7a9e; background: transparent; color: #fff; border-radius: 30px;
    padding: 8px 22px; font-size: 13px; font-weight: 600; cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  button.action:hover { background: #24486e; border-color: #6EBE4F; }
  button.action.primary { background: #6EBE4F; color: #1D3756; border-color: #6EBE4F; }
  button.action.primary:hover { background: #5aaa3f; }
  button.action:disabled { opacity: 0.35; cursor: default; }

  .message { text-align: center; font-size: 14px; min-height: 22px; color: #ccc; margin-bottom: 4px; font-style: italic; }

  .result-screen { display: none; text-align: center; padding: 20px; }
  .result-screen h2 { font-size: 24px; margin-bottom: 8px; color: #6EBE4F; }
  .result-screen p { font-size: 14px; color: #aac4dd; margin-bottom: 16px; }
  .share-box { background: #24486e; border: 1.5px solid #2e5a80; border-radius: 8px; padding: 14px; font-family: monospace; font-size: 18px; letter-spacing: 2px; margin: 0 auto 16px; max-width: 280px; white-space: pre-wrap; line-height: 2; }
  button.share-btn { background: #6EBE4F; color: #1D3756; border: none; border-radius: 30px; padding: 10px 28px; font-size: 14px; font-weight: 700; cursor: pointer; }
  button.share-btn:hover { background: #5aaa3f; }
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <div class="logo-text">Rev<span class="logo-dot">.</span>io</div>
  </div>
  <div class="logo-tag">PSA Knowledge Game</div>
  <div class="game-title">Connections</div>
  <span class="week-badge">Week 1 — Service Module</span>
</header>

<div class="game-area">
  <p class="instructions">Select 4 terms that belong to the same category, then hit Submit.</p>

  <div class="mistakes">
    Mistakes remaining:
    <div class="dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
  </div>

  <div class="message" id="msg"></div>

  <div class="solved-area" id="solved-area"></div>
  <div class="grid" id="grid"></div>

  <div class="btn-row">
    <button class="action" id="shuffle-btn" onclick="shuffleTiles()">Shuffle</button>
    <button class="action" id="deselect-btn" onclick="deselectAll()" disabled>Deselect all</button>
    <button class="action primary" id="submit-btn" onclick="submitGuess()" disabled>Submit</button>
  </div>

  <div class="result-screen" id="result-screen">
    <h2 id="result-title"></h2>
    <p id="result-sub"></p>
    <div class="share-box" id="share-box"></div>
    <button class="share-btn" onclick="copyResult()">Copy result</button>
  </div>
</div>

<script>
const CATEGORIES = [
  {
    name: "Found on a Ticket",
    color: "#1a6644", textColor: "#fff",
    words: ["ACTIVITY", "TIME LOG", "TASK", "PURCHASE ORDER"],
    hint: "These are all tabs you'll find inside a Service Ticket"
  },
  {
    name: "Ways to Update a Customer Account",
    color: "#7a5c00", textColor: "#fff",
    words: ["ADD CHARGE", "ADD CREDIT", "ADD PAYMENT", "CREATE INVOICE"],
    hint: "These are all Quick Actions on a Customer Profile"
  },
  {
    name: "Part of the Customer Profile",
    color: "#0d3d6b", textColor: "#fff",
    words: ["JOURNAL", "CONTACTS", "PORTAL USERS", "RELATED ACCOUNTS"],
    hint: "These are tabs under the Overview section of a Customer Profile"
  },
  {
    name: "Used to Schedule & Assign Work",
    color: "#4a1a5e", textColor: "#fff",
    words: ["CALENDAR", "DISPATCH BOARD", "TICKET", "TIMELINE"],
    hint: "These tools in the Scheduling module help assign and track work"
  }
];

const colorEmoji = {
  "#1a6644": "🟢",
  "#7a5c00": "🟡",
  "#0d3d6b": "🔵",
  "#4a1a5e": "🟣"
};

let tiles = [], selected = [], mistakes = 0, solved = [], guessHistory = [], gameOver = false;

function init() {
  tiles = CATEGORIES.flatMap(c => c.words.map(w => ({ word: w, category: c.name })));
  shuffleTiles(true);
}

function shuffleTiles(first) {
  const remaining = tiles.filter(t => !solved.includes(t.category));
  for (let i = remaining.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [remaining[i], remaining[j]] = [remaining[j], remaining[i]];
  }
  tiles = [...tiles.filter(t => solved.includes(t.category)), ...remaining];
  if (!first) renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  tiles.filter(t => !solved.includes(t.category)).forEach(t => {
    const btn = document.createElement('button');
    btn.className = 'tile' + (selected.includes(t.word) ? ' selected' : '');
    btn.textContent = t.word;
    btn.onclick = () => toggleSelect(t.word, btn);
    grid.appendChild(btn);
  });
  updateButtons();
}

function toggleSelect(word, btn) {
  if (gameOver) return;
  if (selected.includes(word)) {
    selected = selected.filter(w => w !== word);
    btn.classList.remove('selected');
  } else {
    if (selected.length >= 4) return;
    selected.push(word);
    btn.classList.add('selected');
    btn.classList.add('pop');
    setTimeout(() => btn.classList.remove('pop'), 300);
  }
  updateButtons();
}

function deselectAll() {
  selected = [];
  document.querySelectorAll('.tile.selected').forEach(el => el.classList.remove('selected'));
  updateButtons();
}

function updateButtons() {
  const n = selected.length;
  document.getElementById('submit-btn').disabled = n !== 4;
  document.getElementById('deselect-btn').disabled = n === 0;
}

function submitGuess() {
  if (selected.length !== 4) return;
  const cat = CATEGORIES.find(c =>
    selected.every(w => c.words.includes(w)) && c.words.every(w => selected.includes(w))
  );
  guessHistory.push({ correct: !!cat, words: selected.slice(), category: cat });
  if (cat) {
    solved.push(cat.name);
    const row = document.createElement('div');
    row.className = 'solved-row';
    row.style.background = cat.color;
    row.style.color = cat.textColor;
    row.innerHTML = `<div class="cat-name">${cat.name}</div><div class="cat-words">${cat.words.join(' · ')}</div>`;
    document.getElementById('solved-area').appendChild(row);
    tiles = tiles.filter(t => t.category !== cat.name);
    selected = [];
    showMsg('Correct! ' + cat.hint, '#6EBE4F');
    if (solved.length === CATEGORIES.length) { setTimeout(endGame, 700); return; }
  } else {
    const almost = CATEGORIES.find(c => selected.filter(w => c.words.includes(w)).length === 3);
    mistakes++;
    document.getElementById('d' + (mistakes - 1)).classList.add('used');
    document.querySelectorAll('.tile.selected').forEach(el => {
      el.classList.add('shake');
      setTimeout(() => el.classList.remove('shake'), 400);
    });
    showMsg(almost ? 'One away! Keep thinking...' : 'Not quite — try again!', '#ff8c69');
    if (mistakes >= 4) { setTimeout(endGame, 700); return; }
  }
  selected = [];
  renderGrid();
}

function showMsg(text, color) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.style.color = color || '#ccc';
  setTimeout(() => { el.textContent = ''; }, 3000);
}

function endGame() {
  gameOver = true;
  document.getElementById('grid').innerHTML = '';
  ['submit-btn','deselect-btn','shuffle-btn'].forEach(id => document.getElementById(id).disabled = true);
  const won = solved.length === CATEGORIES.length;
  document.getElementById('result-screen').style.display = 'block';
  document.getElementById('result-title').textContent = won ? 'You got it!' : 'Better luck next week!';
  document.getElementById('result-sub').textContent = won
    ? `Solved with ${mistakes} mistake${mistakes !== 1 ? 's' : ''}. Great work!`
    : `You solved ${solved.length} of 4 categories.`;
  let emojiGrid = 'Rev.io Connections – Week 1\n';
  guessHistory.forEach(g => {
    if (g.correct) {
      const e = colorEmoji[CATEGORIES.find(c => c.name === g.category.name).color];
      emojiGrid += e + e + e + e + '\n';
    } else {
      emojiGrid += CATEGORIES.map(c => colorEmoji[c.color].repeat(g.words.filter(w => c.words.includes(w)).length)).join('') + '\n';
    }
  });
  document.getElementById('share-box').textContent = emojiGrid.trim();
}

function copyResult() {
  navigator.clipboard.writeText(document.getElementById('share-box').textContent).then(() => {
    const btn = document.querySelector('.share-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy result', 1500);
  });
}

init();
renderGrid();
</script>
</body>
</html>
